<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hope for Justice Assistant</title>

<style>
:root {
  --red:#c62828;
  --red-soft:#fdecec;
  --border:#ead6d6;
  --text:#2b2b2b;
  --muted:#6b7280;
  --bg:#f7f7f7;
}

body {
  margin:0;
  padding:20px;
  font-family: Arial, sans-serif;
  background:var(--bg);
}

.container {
  max-width:900px;
  margin:auto;
  background:white;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.header {
  padding:20px;
  border-bottom:4px solid var(--red);
}

.logo {
  width:160px;
  max-width:100%;
  height:auto;
}

.safety {
  background:#fff4db;
  padding:10px 20px;
  font-size:14px;
}

.quick {
  padding:10px 20px;
}

.quick button {
  margin:4px;
  padding:8px 12px;
  border-radius:20px;
  border:1px solid #f3c2c2;
  background:var(--red-soft);
  color:var(--red);
  cursor:pointer;
}

.chat {
  height:450px;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.message {
  display:flex;
  animation:fade 0.25s ease;
}

.user {
  justify-content:flex-end;
}

.bot {
  justify-content:flex-start;
}

.bubble {
  max-width:60%;
  padding:12px;
  border-radius:14px;
  font-size:15px;
  line-height:1.5;
  word-break:break-word;
}

.user .bubble {
  background:var(--red);
  color:white;
}

.bot .bubble {
  background:white;
  border:1px solid var(--border);
  color:var(--text);
}

.badge {
  font-size:11px;
  margin-bottom:6px;
  font-weight:bold;
}

.hfj {
  color:var(--red);
}

.ai {
  color:#888;
}

.source {
  font-size:12px;
  margin-top:6px;
}

.source a {
  color:var(--red);
  text-decoration:none;
  word-break:break-all;
}

.input {
  display:flex;
  padding:15px;
  border-top:1px solid #eee;
  gap:10px;
}

input {
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:15px;
}

button.send {
  background:var(--red);
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  cursor:pointer;
}

.typing {
  display:flex;
  gap:4px;
  margin-left:6px;
}

.typing span {
  width:6px;
  height:6px;
  background:#bbb;
  border-radius:50%;
  animation:bounce 1.2s infinite;
}

.typing span:nth-child(2) { animation-delay:0.2s; }
.typing span:nth-child(3) { animation-delay:0.4s; }

@keyframes bounce {
  0%,80%,100% { transform:scale(0.6); opacity:0.5; }
  40% { transform:scale(1); opacity:1; }
}

@keyframes fade {
  from { opacity:0; transform:translateY(5px); }
  to { opacity:1; }
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Hope_for_Justice_logo_2017_jpg.jpg/1920px-Hope_for_Justice_logo_2017_jpg.jpg" alt="Hope for Justice logo">
  </div>

  <div class="safety">
    If someone is in immediate danger, contact emergency services.
  </div>

<div class="quick">
  <button onclick="sendPreset('What is human trafficking?')">Learn</button>
  <button onclick="sendPreset('How do I spot the signs?')">Signs</button>
  <button onclick="sendPreset('I think someone is being controlled')">Get help</button>
  <button onclick="sendPreset('I am in Minnesota')">Support in Minnesota</button>
  <button onclick="sendPreset('I am in the United States')">Support in the U.S.</button>
</div>

  <div id="chat" class="chat">
    <div class="message bot">
      <div class="bubble">
        <div class="badge hfj">From Hope for Justice</div>
        Hello — I can help explain trafficking and guide you to support.
      </div>
    </div>
  </div>

  <div class="input">
    <input id="input" placeholder="Ask a question...">
    <button class="send" onclick="sendMessage()">Send</button>
  </div>

</div>

<script>
  const API_URL = "https://hfj-assistant.onrender.com/chat";
  let sessionId = localStorage.getItem("hfj_session_id") || null;

  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  function renderSources(source, extraSources = []) {
    const links = [];

    if (source && source !== "AI-generated general guidance") {
      const safeSource = escapeHtml(source);
      links.push(`<a href="${safeSource}" target="_blank" rel="noopener noreferrer">${safeSource}</a>`);
    }

    extraSources.forEach((item) => {
      const safeItem = escapeHtml(item);
      links.push(`<a href="${safeItem}" target="_blank" rel="noopener noreferrer">${safeItem}</a>`);
    });

    if (!links.length) return "";

    return `
      <div class="source">
        Sources:<br>${links.join("<br>")}
      </div>
    `;
  }

  function appendMessage(role, text, source = null, type = null, extraSources = []) {
    const chatBox = document.getElementById("chat");
    const safeText = escapeHtml(text).replace(/\n/g, "<br>");

    let badgeHtml = "";
    if (role === "bot" && type === "hfj") {
      badgeHtml = `<div class="badge hfj">From Hope for Justice / official resources</div>`;
    } else if (role === "bot" && type === "ai") {
      badgeHtml = `<div class="badge ai">General guidance</div>`;
    }

    const sourceHtml = role === "bot" ? renderSources(source, extraSources) : "";

    const messageHtml = `
      <div class="message ${role}">
        <div class="bubble">
          ${badgeHtml}
          ${safeText}
          ${sourceHtml}
        </div>
      </div>
    `;

    chatBox.insertAdjacentHTML("beforeend", messageHtml);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function sendPreset(text) {
    document.getElementById("input").value = text;
    sendMessage();
  }

  async function sendMessage() {
    const input = document.getElementById("input");
    const chatBox = document.getElementById("chat");
    const message = input.value.trim();

    if (!message) return;

    appendMessage("user", message);
    input.value = "";

    const typingId = "typing-" + Date.now();
    const typingHtml = `
      <div id="${typingId}" class="typing">
        <span></span><span></span><span></span>
      </div>
    `;
    chatBox.insertAdjacentHTML("beforeend", typingHtml);
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: message,
          session_id: sessionId
        })
      });

      const data = await response.json();

      const typingEl = document.getElementById(typingId);
      if (typingEl) typingEl.remove();

      if (data.session_id) {
        sessionId = data.session_id;
        localStorage.setItem("hfj_session_id", sessionId);
      }

      if (data.reply) {
        appendMessage("bot", data.reply, data.source, data.type, data.extra_sources || []);
      } else if (data.detail) {
        appendMessage("bot", "Error: " + data.detail, null, "ai");
      } else {
        appendMessage("bot", "Sorry, I could not understand the response.", null, "ai");
      }
    } catch (error) {
      const typingEl = document.getElementById(typingId);
      if (typingEl) typingEl.remove();

      appendMessage("bot", "Sorry, something went wrong connecting to the assistant.", null, "ai");
    }
  }

  document.getElementById("input").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
      sendMessage();
    }
  });
</script>

</body>
</html>
